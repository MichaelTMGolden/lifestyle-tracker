# Render Blueprint — provisions the database + web service from this repo.
# In Render: New → Blueprint → pick this repo → Apply.
databases:
  - name: dashboard-db
    databaseName: personal_dashboard
    user: dashboard
    plan: free            # free Postgres expires after ~90 days; bump to a paid plan to keep it

services:
  - type: web
    name: personal-dashboard
    runtime: docker
    plan: free            # free web services sleep when idle (cold starts); fine for personal use
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    autoDeploy: true       # redeploy on every push to the connected branch
    envVars:
      - key: ConnectionStrings__Postgres
        fromDatabase:
          name: dashboard-db
          property: connectionString
      - key: Usda__ApiKey
        sync: false        # set this secret in the Render dashboard (optional — enables USDA food search)
      - key: GARMIN_ENC_KEY
        generateValue: true   # encrypts your stored Garmin password at rest (stable across restarts)
      - key: SIDECAR_TOKEN
        generateValue: true   # shared secret between the API and the in-container Garmin sidecar
      - key: SIDECAR_URL
        value: http://127.0.0.1:8001   # the sidecar runs inside this container
      - key: SYNC_HOURS
        value: "1"   # auto-sync all connections (Garmin + Google) every N hours (fractions ok; 0 disables)
